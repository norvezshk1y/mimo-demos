name: Build Android APK

on:
  workflow_dispatch:

env:
  PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: 0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Setup Java
        uses: actions/setup-java@v6
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install buildozer
        run: pip install buildozer cython
      - name: Accept SDK licenses in buildozer.spec
        run: |
          sed -i.bak "s/# android.accept_sdk_license = False/android.accept_sdk_license = True/" buildozer.spec
          sed -i.bak "s/#p4a.branch = master/p4a.branch = develop/" buildozer.spec
      - name: Download SDK, NDK, and p4a
        run: buildozer android p4a -- --help
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake libltdl-dev
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kivy-demo-apk
          path: bin/*.apk
          retention-days: 30
