name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with buildozer-action
        uses: kivy/buildozer-action@v1.0.0
        with:
          buildozer-version: develop
          command: android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivy-demo-apk
          path: bin/*.apk
          retention-days: 30
